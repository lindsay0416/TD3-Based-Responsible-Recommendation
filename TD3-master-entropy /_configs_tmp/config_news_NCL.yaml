# Path A K=5 Table 3 retrain config (sigmoid_scale=3500).
# Rendered per (dataset, backbone) by generate_config.py.
# Placeholders: news, NCL, 3500, /Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /results_table3_retrain

experiment_params:
  topk: 5
  rs_model: "NCL"
  dataset: "news"
  clustering: K_means       # historical name; Phase 2 stores Path A clusters under this key

training:
  episodes: 50              # paper §5 canonical: 50-episode training
  rounds_per_episode: 50
  users_per_round: 5000
  batch_size: 1000
  warmup_transitions: 5000
  train_frequency: 1

td3:
  discount: 0.95
  tau: 0.005
  policy_noise: 0.2
  noise_clip: 0.5
  policy_freq: 2
  batch_size: 128
  learning_rate: 0.0003

environment:
  state_dim: 69             # 5 (beliefs) + 64 (user emb)
  action_dim: 64
  max_action: 1.0
  num_clusters: 5
  use_intelligent_acceptance: true
  user_acceptance_rate: 0.25
  sigmoid_scale: 3500
  baseline_acceptance_rate: 0.1
  max_cluster_distance: 4
  forced_cluster3_ratio: 0.0

recommendation:
  rl_list_size: 60
  total_recommendations: 100
  similarity_metric: cosine

reward:
  step_based: true
  termination_threshold: 0.15
  termination_reward: 5.0
  max_cluster_distance: 1.0
  use_gpu_rewards: true
  entropy_reward_weight: 1.0
  improvement_threshold: 0.01
  store_individual_rewards: false
  aggregate_rewards: true
  reward_aggregation_window: 50

data_paths:
  item_embeddings: "embeddings/news/K_means/NCL/item_embedding.pkl"
  user_embeddings: "embeddings/news/K_means/NCL/user_embedding.pkl"
  recommendations: "embeddings/news/K_means/NCL/recommendations.pkl"
  item_token_map: "embeddings/news/K_means/item_token_map.json"
  user_token_map: "embeddings/news/K_means/user_token_map.json"
  cluster_assignments: "embeddings/news/K_means/cluster_matrix_manifest_K5.json"
  cluster_centers: "embeddings/news/K_means/cluster_centroids.json"
  cluster_distances: "embeddings/news/K_means/cluster_distances_K5.pt"
  test_set: "embeddings/news/K_means/test_set.csv"
  test_set_info: "embeddings/news/K_means/test_set_info.json"
  cluster_embeddings: "processed_data/news/K_means/cluster_embeddings.pkl"
  natural_beliefs: "processed_data/news/K_means/natural_belief_target.json"
  user_beliefs: "processed_data/news/K_means/user_average_beliefs.json"

logging:
  save_frequency: 1000
  log_frequency: 100
  results_dir: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /results_table3_retrain/news/NCL/results"
  models_dir: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /results_table3_retrain/news/NCL/models"

experiment:
  seed: 42
  device: auto
  num_workers: 1

debug:
  verbose: false
  save_transitions: false
  validate_data: false
