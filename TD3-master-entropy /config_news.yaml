# ============================================================================
# Recommendation RL System Configuration — NEWS Dataset
# ============================================================================
# Adapted from books config. Key differences:
#   - Embedding dim = 64 (books = 128)
#   - state_dim = 69 (5 beliefs + 64 user embedding)
#   - action_dim = 64
#   - max_cluster_distance adjusted for news data
# ============================================================================

# ============================================================================
# EXPERIMENT PARAMETERS
# ============================================================================
# cd "TD3-master-entropy ": python run_recommendation_rl.py --config config_news.yaml

experiment_params:
  rs_model: "LightGCN"
  dataset: "news"
  clustering: "K_means"

# Training Parameters
training:
  episodes: 100                  # Total number of training episodes
  rounds_per_episode: 50        # Rounds per episode
  users_per_round: 50000        # Number of users to train per round
  batch_size: 1000              # Batch size for GPU-accelerated processing
  warmup_transitions: 10000    # Transitions before TD3 training starts
  train_frequency: 1            # Train TD3 every N rounds

# RL Algorithm Parameters (TD3)
td3:
  discount: 0.95
  tau: 0.005
  policy_noise: 0.2
  noise_clip: 0.5
  policy_freq: 2
  batch_size: 128
  learning_rate: 3e-4

# Environment Parameters
environment:
  state_dim: 69                  # State dimension: 5 (beliefs) + 64 (user embedding)
  action_dim: 64                 # Action dimension: virtual item embedding (news = 64d)
  max_action: 1.0

  # Acceptance Probability Settings
  use_intelligent_acceptance: true
  user_acceptance_rate: 0.25

  # Sigmoid-based Acceptance Parameters
  sigmoid_scale: 10000
  baseline_acceptance_rate: 0.2
  max_cluster_distance: 4

  # Forced Cluster Exploration
  forced_cluster3_ratio: 0.0

# Recommendation Parameters
recommendation:
  rl_list_size: 40
  total_recommendations: 40
  similarity_metric: "cosine"

# Reward Parameters (Step-based System)
reward:
  step_based: true
  termination_threshold: 0.10
  termination_reward: 5.0
  max_cluster_distance: 1.0
  use_gpu_rewards: true
  entropy_reward_weight: 10.0
  improvement_threshold: 0.01
  store_individual_rewards: false
  aggregate_rewards: true
  reward_aggregation_window: 50

# ============================================================================
# DATA PATHS — News / K_means / LightGCN
# ============================================================================
data_paths:
  item_embeddings:     "embeddings/news/K_means/LightGCN/item_embedding.pkl"
  user_embeddings:     "embeddings/news/K_means/LightGCN/user_embedding.pkl"
  recommendations:     "embeddings/news/K_means/LightGCN/recommendations.pkl"
  item_token_map:      "embeddings/news/K_means/item_token_map.json"
  user_token_map:      "embeddings/news/K_means/user_token_map.json"
  cluster_assignments: "embeddings/news/K_means/cluster_matrix_manifest_K5.pkl"
  cluster_centers:     "embeddings/news/K_means/cluster_centroids.json"
  cluster_distances:   "embeddings/news/K_means/node_to_center_distance.pt"
  test_set:            "embeddings/news/K_means/test_set.csv"
  test_set_info:       "embeddings/news/K_means/test_set_info.json"
  cluster_embeddings:  "processed_data/news/K_means/cluster_embeddings.pkl"
  natural_beliefs:     "processed_data/news/K_means/natural_belief_target.pkl"
  user_beliefs:        "processed_data/news/K_means/user_average_beliefs.pkl"

# Logging and Saving
logging:
  save_frequency: 1000
  log_frequency: 100
  results_dir: "results"
  models_dir: "models"

# Experiment Settings
experiment:
  seed: 42
  device: "auto"
  num_workers: 1

# Debug Settings
debug:
  verbose: true
  save_transitions: false
  validate_data: true
