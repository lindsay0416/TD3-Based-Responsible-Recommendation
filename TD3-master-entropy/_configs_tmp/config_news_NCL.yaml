# Path A K=5 Table 3 retrain canonical config (sigmoid_scale=3500).
# This template is rendered per (dataset, backbone) by generate_config.py.
#
# Placeholders filled at render time:
#   news        -> news | books | movies
#   NCL       -> ENMF | LightGCN | NCL | NGCF | SGL
#   /Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy       -> absolute path to TD3-master-entropy/ on the host
#   3500  -> 3500 (Table 3 canonical) by default
#   results_table3_retrain       -> base dir for results/models output

experiment_params:
  topk: 5
  rs_model: "NCL"
  dataset: "news"
  clustering: K_means       # historical name; Phase 2 stores Path A clusters under this key

training:
  episodes: 50              # paper §5 canonical: 50-episode training
  rounds_per_episode: 50
  users_per_round: 50000
  batch_size: 1000
  warmup_transitions: 100000
  train_frequency: 1

td3:
  discount: 0.95
  tau: 0.005
  policy_noise: 0.2
  noise_clip: 0.5
  policy_freq: 2
  batch_size: 128
  learning_rate: 0.0003

environment:
  state_dim: 69             # 5 (beliefs) + 64 (user emb)
  action_dim: 64
  max_action: 0.5    # FIX 2026-05-24 (B): was 1.0; halved to give tanh more linear headroom
  num_clusters: 5
  use_intelligent_acceptance: true
  user_acceptance_rate: 0.25
  sigmoid_scale: 3500
  baseline_acceptance_rate: 0.1
  max_cluster_distance: 4
  forced_cluster3_ratio: 0.0

recommendation:
  rl_list_size: 60
  total_recommendations: 100
  similarity_metric: cosine

reward:
  step_based: true
  termination_threshold: 0.15
  termination_reward: 5.0
  max_cluster_distance: 1.0
  use_gpu_rewards: true
  entropy_reward_weight: 1.0
  improvement_threshold: 0.01
  store_individual_rewards: false
  aggregate_rewards: true
  reward_aggregation_window: 50

data_paths:
  item_embeddings: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/NCL/item_embedding.pkl"
  user_embeddings: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/NCL/user_embedding.pkl"
  recommendations: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/NCL/recommendations.pkl"
  item_token_map: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/item_token_map.json"
  user_token_map: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/user_token_map.json"
  cluster_assignments: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/cluster_matrix_manifest_K5_topk5.json"
  cluster_centers: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/cluster_centers_K5_topk5.json"
  cluster_distances: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/cluster_distances_K5_topk5.pt"
  test_set: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/test_set.csv"
  test_set_info: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /embeddings/news/Topk5/test_set_info.json"
  cluster_embeddings: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /processed_data/news/Topk5/cluster_embeddings.pkl"
  natural_beliefs: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /processed_data/news/Topk5/natural_belief_target.json"
  user_beliefs: "/Users/lindsay/Desktop/Git/TD3-Based-Responsible-Recommendation/TD3-master-entropy /processed_data/news/Topk5/user_average_beliefs.json"

logging:
  save_frequency: 1000
  log_frequency: 100
  results_dir: "results_table3_retrain/news/NCL/results"
  models_dir: "results_table3_retrain/news/NCL/models"

experiment:
  seed: 42
  device: auto
  num_workers: 1

debug:
  verbose: false
  save_transitions: false
  validate_data: false
